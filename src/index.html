<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token 用量看板</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="title">
        <h1>Token 用量看板</h1>
        <p class="subtitle">跨 Agent 用量统计 · 自动采集本地日志</p>
      </div>
      <div class="header-actions">
        <button id="exportBtn" class="secondary-btn">导出数据</button>
        <label class="secondary-btn file-label">
          导入数据
          <input type="file" id="importInput" accept=".db" hidden>
        </label>
        <button id="rebuildBtn" class="secondary-btn" title="清空并从日志重新计算（修正历史数据后使用）">重建</button>
        <button id="scanBtn" class="scan-btn">
          <span class="icon">↻</span> 扫描日志
        </button>
      </div>
    </header>

    <div id="scanStatus" class="scan-status"></div>

    <section class="summary">
      <div class="card">
        <div class="card-label">累计 Token</div>
        <div class="card-value" id="totalTokens">-</div>
      </div>
      <div class="card">
        <div class="card-label">累计花费 ≈</div>
        <div class="card-value cost" id="totalCost">-</div>
      </div>
      <div class="card">
        <div class="card-label">今日 Token</div>
        <div class="card-value" id="todayTokens">-</div>
      </div>
      <div class="card">
        <div class="card-label">今日花费 ≈</div>
        <div class="card-value cost" id="todayCost">-</div>
      </div>
      <div class="card">
        <div class="card-label">活跃 Agent</div>
        <div class="card-value" id="activeAgents">-</div>
      </div>
      <div class="card">
        <div class="card-label">统计天数</div>
        <div class="card-value" id="trackedDays">-</div>
      </div>
    </section>

    <section class="controls">
      <div class="agent-tabs" id="agentTabs">
        <button class="tab active" data-agent="all">全部</button>
      </div>
    </section>

    <section class="trend-section">
      <div class="section-header">
        <h2>用量趋势</h2>
        <div class="range-tabs" id="rangeTabs">
          <button class="range-tab" data-range="7">近 7 天</button>
          <button class="range-tab active" data-range="30">近 30 天</button>
          <button class="range-tab" data-range="90">近 90 天</button>
          <button class="range-tab" data-range="0">全部</button>
        </div>
      </div>
      <div class="trend-wrapper">
        <div id="trendChart" class="trend-chart"></div>
      </div>
      <div class="trend-legend" id="trendLegend"></div>
    </section>

    <section class="heatmap-section">
      <div class="section-header">
        <h2>每日用量热力图</h2>
        <div class="legend">
          <span>少</span>
          <div class="legend-cells">
            <div class="legend-cell level-0"></div>
            <div class="legend-cell level-1"></div>
            <div class="legend-cell level-2"></div>
            <div class="legend-cell level-3"></div>
            <div class="legend-cell level-4"></div>
          </div>
          <span>多</span>
        </div>
      </div>
      <div class="heatmap-wrapper">
        <div id="heatmap" class="heatmap"></div>
      </div>
    </section>

    <section class="details-section">
      <h2>按 Agent 汇总</h2>
      <div id="agentList" class="agent-list"></div>
    </section>

    <section class="models-section">
      <h2>按模型汇总</h2>
      <table class="records-table">
        <thead>
          <tr>
            <th>Agent</th>
            <th>模型</th>
            <th>Input</th>
            <th>Output</th>
            <th>Cache</th>
            <th>Total</th>
            <th>记录数</th>
            <th>花费 ≈</th>
          </tr>
        </thead>
        <tbody id="modelsBody"></tbody>
      </table>
      <p class="hint">花费为估算，按模型价目表 <code>src/pricing.js</code> 计算，未知模型不计。</p>
    </section>

    <section class="records-section">
      <div class="section-header">
        <h2>最近记录</h2>
        <div class="records-filter" id="recordsFilter" hidden>
          <span id="recordsFilterLabel"></span>
          <button id="clearFilterBtn" class="link-btn">清除</button>
        </div>
      </div>
      <table class="records-table">
        <thead>
          <tr>
            <th>时间</th>
            <th>Agent</th>
            <th>模型</th>
            <th>Input</th>
            <th>Output</th>
            <th>Cache</th>
            <th>Total</th>
            <th>花费 ≈</th>
          </tr>
        </thead>
        <tbody id="recordsBody"></tbody>
      </table>
      <div class="load-more-wrap">
        <button id="loadMoreBtn" class="secondary-btn" hidden>加载更多</button>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
