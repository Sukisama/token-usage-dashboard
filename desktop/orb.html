<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
  html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; cursor: default; }
  body { display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, "SF Pro Rounded", "SF Pro Display", BlinkMacSystemFont, sans-serif; }

  .stage { position: relative; width: 72px; height: 72px; }

  /* soft contact shadow that grounds the floating orb */
  .shadow {
    position: absolute; left: 50%; bottom: 2px; transform: translateX(-50%);
    width: 46px; height: 12px; border-radius: 50%;
    background: radial-gradient(ellipse at center, rgba(0,0,0,.45), rgba(0,0,0,0) 72%);
    filter: blur(3px);
    animation: shadowFloat 4.2s ease-in-out infinite;
  }

  /* coloured glow, tinted by the heat level */
  .halo {
    position: absolute; inset: -18px; border-radius: 50%; z-index: 0;
    background: radial-gradient(circle, var(--halo) 28%, rgba(0,0,0,0) 66%);
    animation: breathe 4.2s ease-in-out infinite;
  }

  .float { animation: float 4.2s ease-in-out infinite; }

  .orb {
    position: relative; z-index: 1; width: 60px; height: 60px; border-radius: 50%;
    overflow: hidden; cursor: grab;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    /* lit from top-left, shadow terminator bottom-right */
    background: radial-gradient(130% 130% at 30% 22%,
      var(--c1) 0%, var(--c2) 38%, var(--c3) 70%, var(--c4) 100%);
    box-shadow:
      inset 0 1.5px 1px rgba(255,255,255,.55),     /* crisp top rim light */
      inset 0 -9px 16px rgba(0,0,0,.4),            /* bottom shadow, gives volume */
      inset 0 -2px 3px rgba(255,225,190,.28),      /* warm bounce light at bottom */
      inset 0 0 0 1px rgba(255,255,255,.06);       /* faint edge */
    transition: transform .14s cubic-bezier(.34,1.56,.64,1);
  }
  .orb:active { cursor: grabbing; transform: scale(.94); }

  /* broad soft sheen across the upper half (glass) */
  .orb::before {
    content: ""; position: absolute; top: -4px; left: 5px; width: 50px; height: 38px;
    border-radius: 50%; pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(255,255,255,.5), rgba(255,255,255,0) 66%);
    filter: blur(2px);
  }
  /* tight bright specular dot */
  .spec {
    position: absolute; top: 8px; left: 14px; width: 13px; height: 9px; border-radius: 50%;
    background: radial-gradient(ellipse at center, rgba(255,255,255,.98), rgba(255,255,255,0) 72%);
    pointer-events: none;
  }

  .label { position: relative; z-index: 2; font-size: 8px; font-weight: 600; letter-spacing: .3px;
    color: var(--fg); text-shadow: var(--fg-shadow); opacity: .9; margin-top: 1px; }
  .value { position: relative; z-index: 2; font-size: 15px; font-weight: 800; line-height: 1.05;
    color: var(--fg); text-shadow: var(--fg-shadow);
    font-variant-numeric: tabular-nums; letter-spacing: -.3px; }

  @keyframes float      { 0%,100% { transform: translateY(1.5px); } 50% { transform: translateY(-3px); } }
  @keyframes shadowFloat{ 0%,100% { opacity: .5; transform: translateX(-50%) scale(1); }
                          50%      { opacity: .34; transform: translateX(-50%) scale(.82); } }
  @keyframes breathe    { 0%,100% { opacity: .5; transform: scale(.95); }
                          50%      { opacity: .82; transform: scale(1.05); } }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="shadow"></div>
    <div class="halo"></div>
    <div class="float">
      <div class="orb" id="orb">
        <div class="spec"></div>
        <div class="label" id="label">今日</div>
        <div class="value" id="value">—</div>
      </div>
    </div>
  </div>

<script>
  const stage = document.getElementById('stage');
  const orb = document.getElementById('orb');
  const valueEl = document.getElementById('value');
  const labelEl = document.getElementById('label');
  const LABELS = { today:'今日', week:'本周', month:'本月', all:'全部' };
  let PORT = 7373;
  let metric = 'today';

  const HEAT = [
    { c1:'#9aa6b4', c2:'#6b7684', c3:'#454e59', c4:'#2e3640', halo:'rgba(140,155,175,.34)' },
    { c1:'#e0a878', c2:'#b6642c', c3:'#7c3f15', c4:'#572d0f', halo:'rgba(182,100,44,.36)'  },
    { c1:'#f7a95c', c2:'#d55b10', c3:'#96380a', c4:'#682807', halo:'rgba(213,91,16,.4)'    },
    { c1:'#ffbc70', c2:'#f2740f', c3:'#b5470a', c4:'#7f3207', halo:'rgba(242,116,15,.44)'  },
    { c1:'#ffd99a', c2:'#fb923c', c3:'#d1490b', c4:'#8f3307', halo:'rgba(251,146,60,.5)'   },
  ];

  function fmt(n) {
    if (!n) return '0';
    if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return String(n);
  }

  function luminance(hex) {
    const m = hex.replace('#', '');
    const v = [0, 2, 4].map(i => {
      let c = parseInt(m.substr(i, 2), 16) / 255;
      return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
    });
    return 0.2126 * v[0] + 0.7152 * v[1] + 0.0722 * v[2];
  }

  function applyHeat(level) {
    const h = HEAT[Math.max(0, Math.min(4, level | 0))];
    const s = stage.style;
    s.setProperty('--c1', h.c1); s.setProperty('--c2', h.c2);
    s.setProperty('--c3', h.c3); s.setProperty('--c4', h.c4);
    s.setProperty('--halo', h.halo);
    // Decide by the body colour (c2), where the text actually sits.
    const light = luminance(h.c2) > 0.55;
    if (light) {
      s.setProperty('--fg', '#3a1c05');
      s.setProperty('--fg-shadow', '0 1px 1px rgba(255,240,220,.55)');
    } else {
      s.setProperty('--fg', '#ffffff');
      s.setProperty('--fg-shadow', '0 1px 2px rgba(45,16,0,.65)');
    }
  }

  async function refresh() {
    labelEl.textContent = LABELS[metric] || '今日';
    try {
      const res = await fetch(`http://localhost:${PORT}/api/period-summary?period=${metric}`);
      const data = await res.json();
      valueEl.textContent = fmt(data.total_tokens);
      applyHeat(data.todayHeatLevel || 0);
    } catch { /* server not up yet */ }
  }

  // --- drag vs click -------------------------------------------------------
  let dragging = false, moved = false, lastX = 0, lastY = 0;
  orb.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    dragging = true; moved = false; lastX = e.screenX; lastY = e.screenY;
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.screenX - lastX, dy = e.screenY - lastY;
    if (Math.abs(dx) > 2 || Math.abs(dy) > 2) moved = true;
    if (dx || dy) { window.orbAPI.moveBy(dx, dy); lastX = e.screenX; lastY = e.screenY; }
  });
  window.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    if (!moved) window.orbAPI.togglePanel();
  });
  orb.addEventListener('contextmenu', e => { e.preventDefault(); window.orbAPI.showMenu(); });

  window.orbAPI?.onMetricChanged?.((_e, m) => { metric = m || 'today'; refresh(); });

  (async () => {
    try { const p = await window.orbAPI?.port?.(); if (p) PORT = p; } catch {}
    try { const m = await window.orbAPI?.orbMetric?.(); if (m) metric = m; } catch {}
    applyHeat(4);
    refresh();
    setInterval(refresh, 8000);
  })();
</script>
</body>
</html>
