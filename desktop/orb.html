<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
  html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; cursor: default; }
  body { display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; }

  .stage { position: relative; width: 62px; height: 62px; }

  /* soft breathing halo behind the sphere; fades fully to transparent
     before the window edge so there is no clipped rectangle */
  .halo {
    position: absolute; inset: -25px; border-radius: 50%; z-index: 0;
    background: radial-gradient(circle, rgba(249,115,22,.42) 30%, rgba(249,115,22,0) 68%);
    animation: breathe 3.4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100% { opacity: .5;  transform: scale(.94); }
    50%     { opacity: .85; transform: scale(1.06); }
  }

  .orb {
    position: relative; z-index: 1; width: 62px; height: 62px; border-radius: 50%;
    overflow: hidden; cursor: grab;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background:
      radial-gradient(circle at 34% 26%,
        #ffd6a8 0%, #fdb877 20%, #fb923c 42%, #f97316 62%, #d94f0b 84%, #a23808 100%);
    box-shadow:
      inset 0 2px 5px rgba(255,226,190,.65),
      inset 0 -7px 13px rgba(120,42,6,.6),
      inset 0 0 0 1px rgba(255,180,120,.25),
      0 4px 12px rgba(249,115,22,.4);
    transition: transform .12s ease;
  }
  .orb:active { cursor: grabbing; transform: scale(.95); }

  /* rotating specular sweep — the "炫" shimmer */
  .sheen {
    position: absolute; inset: -30%; border-radius: 50%; pointer-events: none;
    background: conic-gradient(from 0deg,
      rgba(255,255,255,0) 0deg,
      rgba(255,255,255,0) 55deg,
      rgba(255,255,255,.45) 90deg,
      rgba(255,255,255,0) 135deg,
      rgba(255,255,255,0) 360deg);
    mix-blend-mode: screen; opacity: .8;
    animation: spin 5.5s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* glossy top-left highlight */
  .spec {
    position: absolute; top: 7px; left: 12px; width: 26px; height: 16px;
    background: radial-gradient(ellipse at center, rgba(255,255,255,.85), rgba(255,255,255,0) 72%);
    border-radius: 50%; pointer-events: none; filter: blur(.4px);
  }

  .label { position: relative; z-index: 2; font-size: 8px; font-weight: 600; letter-spacing: .5px;
    color: rgba(255,255,255,.9); text-shadow: 0 1px 2px rgba(90,30,0,.5); margin-top: 1px; }
  .value { position: relative; z-index: 2; font-size: 15px; font-weight: 800; line-height: 1.05;
    color: #fff; text-shadow: 0 1px 3px rgba(80,25,0,.55); }
</style>
</head>
<body>
  <div class="stage">
    <div class="halo"></div>
    <div class="orb" id="orb">
      <div class="sheen"></div>
      <div class="spec"></div>
      <div class="label">今日</div>
      <div class="value" id="value">—</div>
    </div>
  </div>

<script>
  const orb = document.getElementById('orb');
  const valueEl = document.getElementById('value');
  let PORT = 7373;

  function fmt(n) {
    if (!n) return '0';
    if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return String(n);
  }

  async function refresh() {
    try {
      const res = await fetch(`http://localhost:${PORT}/api/summary`);
      const data = await res.json();
      const today = (data.today || []).reduce((s, t) => s + (t.total_tokens || 0), 0);
      valueEl.textContent = fmt(today);
    } catch { /* server not up yet */ }
  }

  // --- drag vs click -------------------------------------------------------
  let dragging = false, moved = false, lastX = 0, lastY = 0;
  orb.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    dragging = true; moved = false; lastX = e.screenX; lastY = e.screenY;
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.screenX - lastX, dy = e.screenY - lastY;
    if (Math.abs(dx) > 2 || Math.abs(dy) > 2) moved = true;
    if (dx || dy) { window.orbAPI.moveBy(dx, dy); lastX = e.screenX; lastY = e.screenY; }
  });
  window.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    if (!moved) window.orbAPI.togglePanel();
  });
  orb.addEventListener('contextmenu', e => { e.preventDefault(); window.orbAPI.togglePanel(); });

  (async () => {
    try { const p = await window.orbAPI?.port?.(); if (p) PORT = p; } catch {}
    refresh();
    setInterval(refresh, 8000);
  })();
</script>
</body>
</html>
