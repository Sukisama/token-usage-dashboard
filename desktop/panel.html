<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --surface: #1a1a1e; --surface-2: #27272a; --border: #3f3f46;
    --text: #fafafa; --text-2: #a1a1aa; --brand: #f97316; --brand-light: #fb923c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
  html, body { width: 100%; height: 100%; background: transparent; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; }

  .card {
    position: absolute; inset: 10px;
    background: linear-gradient(180deg, #1d1d21, #161619);
    border: 1px solid var(--border); border-radius: 16px;
    box-shadow: 0 12px 40px rgba(0,0,0,.55);
    padding: 16px; display: flex; flex-direction: column; color: var(--text);
  }
  .top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .top h1 { font-size: 14px; font-weight: 700; }
  .top-right { display: flex; align-items: center; gap: 10px; }
  .date { font-size: 11px; color: var(--text-2); white-space: nowrap; }
  .close { width: 20px; height: 20px; border: none; background: transparent;
    color: var(--text-2); font-size: 14px; cursor: pointer; line-height: 1;
    display: flex; align-items: center; justify-content: center; border-radius: 6px; flex: 0 0 auto; }
  .close:hover { color: var(--text); background: var(--surface-2); }

  .periods { display: flex; gap: 5px; margin-top: 12px; }
  .pbtn { flex: 1; padding: 5px 0; border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface-2); color: var(--text-2); font-size: 12px; cursor: pointer;
    transition: all .15s; }
  .pbtn:hover { color: var(--text); }
  .pbtn.active { background: var(--brand); border-color: var(--brand); color: #fff; font-weight: 600; }

  .hero { display: flex; gap: 10px; margin-top: 12px; }
  .hero .box { flex: 1; background: var(--surface-2); border-radius: 10px; padding: 10px 12px; }
  .hero .k { font-size: 10px; color: var(--text-2); text-transform: uppercase; letter-spacing: .4px; }
  .hero .v { font-size: 22px; font-weight: 800; margin-top: 2px; }
  .hero .v.cost { color: var(--brand-light); }

  .sec-title { font-size: 11px; color: var(--text-2); margin: 15px 0 8px; text-transform: uppercase; letter-spacing: .4px; }
  .agents { display: flex; flex-direction: column; gap: 9px; flex: 1; }
  .row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
  .name { width: 66px; flex: 0 0 auto; text-transform: capitalize; color: var(--text); }
  .bar { flex: 1; height: 8px; background: #2f2f34; border-radius: 4px; overflow: hidden; }
  .bar > span { display: block; height: 100%; border-radius: 4px; }
  .num { width: 52px; text-align: right; color: var(--text-2); flex: 0 0 auto; }
  .empty { color: var(--text-2); font-size: 12px; text-align: center; padding: 18px 0; }

  .foot { display: flex; align-items: center; justify-content: space-between; margin-top: 12px;
    padding-top: 12px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-2); }
  .btn { border: none; border-radius: 9px; padding: 8px 12px; font-size: 12px; font-weight: 600;
    color: #fff; cursor: pointer; background: linear-gradient(135deg, var(--brand), #c2410c); }
  .btn:hover { opacity: .92; }
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <h1 id="title">今日用量</h1>
      <div class="top-right">
        <span class="date" id="date"></span>
        <button class="close" id="close">✕</button>
      </div>
    </div>

    <div class="periods" id="periods">
      <button class="pbtn active" data-period="today">今日</button>
      <button class="pbtn" data-period="week">本周</button>
      <button class="pbtn" data-period="month">本月</button>
      <button class="pbtn" data-period="all">全部</button>
    </div>

    <div class="hero">
      <div class="box"><div class="k">Token</div><div class="v" id="tokens">—</div></div>
      <div class="box"><div class="k">花费 ≈</div><div class="v cost" id="cost">—</div></div>
    </div>

    <div class="sec-title" id="agentsTitle">各 Agent</div>
    <div class="agents" id="agents"></div>

    <div class="foot">
      <span id="totalLine">累计 —</span>
      <button class="btn" id="openBtn">打开完整看板</button>
    </div>
  </div>

<script>
  const AGENT_COLORS = { codex:'#f97316', claude:'#f472b6', 'kimi-code':'#38bdf8',
    workbuddy:'#a78bfa', cursor:'#4ade80', unknown:'#a1a1aa' };
  const LABELS = { today:'今日', week:'本周', month:'本月', all:'全部' };
  let PORT = 7373;
  let period = 'today';

  const fmt = n => !n ? '0' : n >= 1e9 ? (n/1e9).toFixed(1)+'B' : n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'K' : String(n);
  const fmtCost = u => u == null ? '—' : u === 0 ? '$0' : u < 0.01 ? '<$0.01' : u < 100 ? '$'+u.toFixed(2) : '$'+Math.round(u).toLocaleString();
  const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  async function render() {
    document.getElementById('date').textContent =
      new Date().toLocaleDateString('zh-CN', { month:'long', day:'numeric', weekday:'short' });
    document.getElementById('title').textContent = LABELS[period] + '用量';
    document.getElementById('agentsTitle').textContent = `各 Agent（${LABELS[period]}）`;

    let data;
    try { data = await (await fetch(`http://localhost:${PORT}/api/period-summary?period=${period}`)).json(); }
    catch { return; }

    document.getElementById('tokens').textContent = fmt(data.total_tokens);
    document.getElementById('cost').textContent = fmtCost(data.cost);

    const box = document.getElementById('agents');
    box.innerHTML = '';
    const list = (data.byAgent || []).filter(a => a.total_tokens > 0);
    if (!list.length) { box.innerHTML = `<div class="empty">${LABELS[period]}还没有用量</div>`; }
    else {
      const max = Math.max(...list.map(t => t.total_tokens), 1);
      for (const t of list) {
        const c = AGENT_COLORS[t.agent] || AGENT_COLORS.unknown;
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `
          <span class="dot" style="background:${c}"></span>
          <span class="name">${esc(t.agent)}</span>
          <span class="bar"><span style="width:${Math.max(3,(t.total_tokens/max*100)).toFixed(1)}%;background:${c}"></span></span>
          <span class="num">${fmt(t.total_tokens)}</span>`;
        box.appendChild(row);
      }
    }
  }

  async function loadFooter() {
    try {
      const all = await (await fetch(`http://localhost:${PORT}/api/period-summary?period=all`)).json();
      document.getElementById('totalLine').textContent = `累计 ${fmt(all.total_tokens)} · ${fmtCost(all.cost)}`;
    } catch {}
  }

  document.querySelectorAll('.pbtn').forEach(b => b.addEventListener('click', () => {
    period = b.dataset.period;
    document.querySelectorAll('.pbtn').forEach(x => x.classList.toggle('active', x === b));
    render();
  }));
  document.getElementById('openBtn').addEventListener('click', () => window.orbAPI?.openDashboard());
  document.getElementById('close').addEventListener('click', () => window.orbAPI?.closePanel());
  window.orbAPI?.onRefresh?.(() => render());

  (async () => {
    try { const p = await window.orbAPI?.port?.(); if (p) PORT = p; } catch {}
    render(); loadFooter();
  })();
</script>
</body>
</html>
